{% extends "base.html" %}

{% block title %}Changer mon mot de passe{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <span class="eyebrow">Mon compte</span>
        <h1>Changer mon mot de passe</h1>
        <p>Saisissez votre mot de passe actuel puis votre nouveau mot de passe.</p>
    </div>
    <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Retour</a>
</div>

<section class="content-panel">
    <form method="post" class="row g-3" style="max-width:520px;">
        {% csrf_token %}
        <div class="col-12">
            <label class="form-label" for="id_old_password">Mot de passe actuel</label>
            <input type="password" id="id_old_password" name="old_password" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label" for="id_new_password1">Nouveau mot de passe</label>
            <input type="password" id="id_new_password1" name="new_password1" class="form-control" required>
            <small class="form-help">Au moins 8 caractères, pas trop simple.</small>
        </div>
        <div class="col-12">
            <label class="form-label" for="id_new_password2">Confirmer le nouveau mot de passe</label>
            <input type="password" id="id_new_password2" name="new_password2" class="form-control" required>
        </div>
        <div class="col-12">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
        </div>
    </form>
</section>
{% endblock %}
