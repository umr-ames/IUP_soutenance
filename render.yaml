databases:
  - name: iup-soutenance-db
    plan: basic-256mb
    diskSizeGB: 1
    databaseName: iup_soutenance
    user: iup_soutenance

services:
  - type: web
    name: isgi-soutenances
    runtime: python
    plan: starter
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-10000} --workers 2 --threads 2 --timeout 120 --access-logfile - --error-logfile -"
    healthCheckPath: "/healthz/"
    disk:
      name: media
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "True"
      - key: DJANGO_STATIC_ROOT
        value: "/opt/render/project/src/staticfiles"
      - key: DJANGO_MEDIA_ROOT
        value: "/var/data/media"
      - key: DATABASE_URL
        fromDatabase:
          name: iup-soutenance-db
          property: connectionString
